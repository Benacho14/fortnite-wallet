<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Fortnite Rol Wallet</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1>🎮 FORTNITE WALLET</h1>
      <div class="nav-links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="shop.html">Tienda</a>
        <a href="history.html">Historial</a>
        <a href="admin.html">Admin Panel</a>
        <button id="logoutBtn" class="btn-logout">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="welcome-section">
      <h2>¡Bienvenido/a, <span id="username">Jugador</span>!</h2>
      <p>Gestiona tus V-Bucks y compra ítems épicos</p>
    </div>

    <div class="dashboard-grid">
     <!-- Balance Card -->
<div class="card balance-card">
    <div class="card-header">
      <h3>💰 Tu Saldo</h3>
    </div>
    <div class="card-body">
      <div class="balance-display">
        <span class="vbucks-icon">💎</span>
        <span id="balance" class="balance-amount">0</span>
        <span class="vbucks-label">V-Bucks</span>
      </div>
      <button id="rechargeBtn" class="btn-primary">Recargar +1000 V-Bucks</button>
      <a href="transfer.html" class="btn-primary" style="margin-top: 0.5rem; background: linear-gradient(90deg, #f72585, #7209b7); text-decoration: none; display: block; text-align: center;">💸 Transferir V-Bucks</a>
    </div>
  <!-- Agregar este código en la sección de "Acciones Rápidas" de dashboard.html -->
<!-- Reemplaza la sección de quick-actions completa con esto: -->

<!-- Acciones Rápidas (como tarjeta separada igual que transacciones) -->
<div class="card">
  <h3>⚡ Acciones Rápidas</h3>
  <div class="actions-grid">
    <!-- Botón de recargar solo para admins (oculto por defecto) -->
    <button id="rechargeBtn" class="action-btn" style="display: none;">
      <span class="action-icon">💳</span>
      <span class="action-text">Recargar +1000</span>
    </button>
    
    <button onclick="window.location.href='shop.html'" class="action-btn">
      <span class="action-icon">🛒</span>
      <span class="action-text">Ir a Tienda</span>
    </button>
    
    <button onclick="window.location.href='history.html'" class="action-btn">
      <span class="action-icon">📊</span>
      <span class="action-text">Ver Historial</span>
    </button>
    
    <button onclick="window.location.href='football.html'" class="action-btn football-btn">
      <span class="action-icon">⚽</span>
      <span class="action-text">Football Manager</span>
    </button>
  </div>
</div>

<!-- También agregar este CSS en tu archivo css/style.css -->
<style>
.actions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.football-btn {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  position: relative;
  overflow: hidden;
}

.football-btn::before {
  content: '⚽';
  position: absolute;
  font-size: 5em;
  opacity: 0.1;
  right: -20px;
  bottom: -20px;
  animation: rotate 10s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.football-btn:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}
</style>

    <!-- Recent Transactions -->
    <div class="card">
      <div class="card-header">
        <h3>📊 Últimas Transacciones</h3>
      </div>
      <div class="card-body">
        <div id="recentTransactions" class="transactions-list">
          <p class="no-data">Cargando...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="notification" class="notification hidden"></div>

  <script src="js/dashboard.js"></script>
</body>
</html>
